<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy - NeoGauge</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0a0e14; color: #e2e8f0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center justify-center p-6 bg-[radial-gradient(circle_at_center,_#1a1f2e_0%,_#0a0e14_100%)]">
    <div class="max-w-3xl w-full glass p-10 rounded-[2rem] shadow-2xl">
        <h1 class="text-4xl font-bold mb-8 text-purple-400">Privacy Policy / 隐私政策</h1>
        <div class="space-y-6 text-slate-300 leading-relaxed">
            <section>
                <h2 class="text-xl font-bold text-white mb-2">1. Data Collection / 数据收集</h2>
                <p>We do not collect any personal data. / 我们不收集任何个人数据。</p>
            </section>
            <section>
                <h2 class="text-xl font-bold text-white mb-2">2. Location Data / 位置数据</h2>
                <p>Processed strictly on-device. NEVER uploaded or shared. / 仅在本地处理，绝不上传或共享。</p>
            </section>
            <section>
                <h2 class="text-xl font-bold text-white mb-2">3. No Analytics / 无第三方插件</h2>
                <p>No tracking scripts are used. / 不含任何追踪脚本。</p>
            </section>
        </div>
        <div class="mt-12 text-center border-t border-white/5 pt-8">
            <a href="index.html" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-8 rounded-full transition-all">Back to Home / 返回首页</a>
        </div>
    </div>
</body>
</html>
